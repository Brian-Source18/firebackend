{% extends "admin/login.html" %}
{% load static %}

{% block extrastyle %}
{{ block.super }}
<style>
    body.login {
        background: linear-gradient(135deg, #1f2937 0%, #374151 100%) !important;
        display: flex !important;
        align-items: center !important;
        justify-content: center !important;
        min-height: 100vh !important;
    }

    .login #container {
        width: 100% !important;
        max-width: 450px !important;
        margin: 0 auto !important;
    }

    .login #header {
        text-align: center !important;
        margin-bottom: 30px !important;
    }

    .login #header h1 {
        margin: 0 !important;
    }

    .login #header h1 a {
        color: #ffffff !important;
        font-size: 2rem !important;
        font-weight: 700 !important;
        text-shadow: 2px 2px 4px rgba(0,0,0,0.3) !important;
    }

    .login #header h1 a::before {
        content: "🔥 ";
    }

    .login #content {
        background: #ffffff !important;
        border: none !important;
        border-radius: 12px !important;
        padding: 40px !important;
        box-shadow: 0 10px 40px rgba(0,0,0,0.3) !important;
    }

    .login form {
        margin: 0 !important;
    }

    .login .form-row {
        margin-bottom: 20px !important;
    }

    .login .form-row label {
        display: block !important;
        color: #374151 !important;
        font-weight: 600 !important;
        margin-bottom: 8px !important;
        font-size: 0.95rem !important;
    }

    .login .form-row input[type="text"],
    .login .form-row input[type="password"] {
        width: 100% !important;
        border: 2px solid #d1d5db !important;
        border-radius: 8px !important;
        padding: 12px 15px !important;
        font-size: 1rem !important;
        transition: all 0.2s !important;
    }

    .login .form-row input[type="text"]:focus,
    .login .form-row input[type="password"]:focus {
        border-color: #dc2626 !important;
        outline: none !important;
        box-shadow: 0 0 0 3px rgba(220, 38, 38, 0.1) !important;
    }

    .login .submit-row {
        margin-top: 30px !important;
        padding: 0 !important;
    }

    .login input[type="submit"] {
        width: 100% !important;
        background: #dc2626 !important;
        color: #ffffff !important;
        font-weight: 700 !important;
        font-size: 1.1rem !important;
        padding: 14px !important;
        border-radius: 8px !important;
        border: none !important;
        cursor: pointer !important;
        transition: all 0.2s !important;
    }

    .login input[type="submit"]:hover {
        background: #b91c1c !important;
        color: #ffffff !important;
        transform: translateY(-2px) !important;
        box-shadow: 0 6px 20px rgba(220, 38, 38, 0.3) !important;
    }

    .login .errornote {
        background: #dc2626 !important;
        color: #ffffff !important;
        padding: 12px 15px !important;
        border-radius: 8px !important;
        margin-bottom: 20px !important;
        font-weight: 500 !important;
    }
</style>
{% endblock %}
